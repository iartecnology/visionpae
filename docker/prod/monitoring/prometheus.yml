global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]

  - job_name: "api"
    static_configs:
      - targets: ["api:3001"]

  - job_name: "node"
    static_configs:
      - targets: ["api:3001", "worker:3003"]

  - job_name: "postgres"
    static_configs:
      - targets: ["db:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
