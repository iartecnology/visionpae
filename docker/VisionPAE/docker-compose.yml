x-app-base: &app-base
  env_file: ../../.env.development
  networks:
    - pae-net
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_started
    minio:
      condition: service_started

services:
  traefik:
    container_name: VisionPAE-Traefik
    image: traefik:v3.0
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../docker/VisionPAE/traefik.dev.yml:/etc/traefik/traefik.yml:ro
    networks:
      - pae-net

  api:
    container_name: VisionPAE
    <<: *app-base
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile.dev
    environment:
      DB_HOST: db
      DB_USER: pae
      DB_NAME: pae_dev
      DATABASE_URL: postgresql://pae:pae_dev_pass@db:5432/pae_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ../../apps/api/src:/app/apps/api/src
      - ../../apps/api/prisma:/app/apps/api/prisma
      - ../../packages:/app/packages

  web:
    container_name: VisionPAE-Web
    <<: *app-base
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://pae:pae_dev_pass@db:5432/pae_dev
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    command: pnpm --filter web dev
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/web/src:/app/apps/web/src
      - ../../packages:/app/packages

  worker:
    container_name: VisionPAE-Worker
    <<: *app-base
    build:
      context: ../../
      dockerfile: apps/worker/Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://pae:pae_dev_pass@db:5432/pae_dev
      REDIS_URL: redis://redis:6379
    command: pnpm --filter worker dev
    restart: unless-stopped
    volumes:
      - ../../apps/worker/src:/app/apps/worker/src
      - ../../packages:/app/packages
    profiles:
      - worker

  db:
    container_name: VisionPAE-Database
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: pae_dev
      POSTGRES_USER: pae
      POSTGRES_PASSWORD: pae_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pae -d pae_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pae-net

  redis:
    container_name: Redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - pae-net

  minio:
    container_name: VisionPAE-MinIO
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - pae-net

  mailpit:
    container_name: VisionPAE-Mailpit
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  redis_data:
  minio_data:

networks:
  pae-net:
    driver: bridge
